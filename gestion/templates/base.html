{% load static %}
<!DOCTYPE html>
<html class="light notranslate" lang="es" translate="no">
<head>
    <meta charset="utf-8"/>
    <meta name="google" content="notranslate" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}Sovereign Archive{% endblock %}</title>
    
    <script src="{% static 'js/tailwind.js' %}"></script>
    
    <link rel="stylesheet" href="{% static 'css/iconos.css' %}">

    <link rel="stylesheet" href="{% static 'css/institucional.css' %}">
    <link rel="stylesheet" href="{% static 'css/leaflet.css' %}">
    <script src="{% static 'js/leaflet.js' %}"></script>
    
    <style>
        :root {
            --primary: #770003;
            --primary-container: #a10508;
            --surface: #f7f9fc;
            --on-surface: #191c1e;
            --on-surface-variant: #5b403c;
        }

        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined' !important;
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            vertical-align: middle;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
    </style>
    <style>
        /* ... tu CSS actual ... */
        
        /* Asegurar colores base si Tailwind tarda en cargar */
        .bg-gradient-to-br { background: linear-gradient(to bottom right, #770003, #a10508); }
        .text-primary { color: #770003; }
        .bg-primary-container { background-color: #a10508; }
        .text-on-primary { color: white; }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body class="bg-surface text-on-surface h-screen overflow-hidden flex"> 

    {% include 'components/sidebar.html' %}

    <div class="flex-1 flex flex-col min-w-0 h-full relative overflow-hidden">
        {% include 'components/topbar.html' %}

        <!-- Área de contenido con scroll independiente -->
        <main class="flex-1 overflow-y-auto overflow-x-hidden p-8 lg:p-12">
            <div class="max-w-[1600px] mx-auto h-full"> 
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
