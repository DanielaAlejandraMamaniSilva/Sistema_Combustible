{% load static %}
<!DOCTYPE html>
<html class="light" lang="es" class="notranslate" translate="no">
<head>
    <meta charset="utf-8"/>
    <meta name="google" content="notranslate" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}Sovereign Archive{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Roboto:wght@300;400;500;700&family=Public+Sans:wght@400;500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "primary": "#770003",
                "primary-container": "#a10508",
                "surface": "#f7f9fc",
                "on-surface": "#191c1e",
                "on-surface-variant": "#5b403c",
                "surface-container-low": "#f2f4f7",
                "surface-container-high": "#e6e8eb",
                "surface-container-highest": "#e0e3e6",
                "surface-container-lowest": "#ffffff",
                "error": "#ba1a1a",
                "error-container": "#ffdad6",
            },
            "fontFamily": {
                "headline": ["Montserrat"],
                "body": ["Roboto"],
                "label": ["Inter"],
                "brand": ["Public Sans"]
            }
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
            font-family: 'Material Symbols Outlined' !important;
        }
        /* Eliminar scrollbars visuales pero mantener funcionalidad */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-surface text-on-surface font-body h-screen overflow-hidden flex"> <!-- Añadido h-screen overflow-hidden -->

    {% include 'components/sidebar.html' %}

    <!-- Contenedor Derecho -->
    <div class="flex-1 flex flex-col min-w-0 h-full relative">
        {% include 'components/topbar.html' %}

        <!-- Área de contenido con scroll independiente -->
        <main class="flex-1 overflow-y-auto overflow-x-hidden p-8 lg:p-12">
            <div class="max-w-[1600px] mx-auto"> <!-- Contenedor opcional para que en pantallas gigantes no se estire tanto -->
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
