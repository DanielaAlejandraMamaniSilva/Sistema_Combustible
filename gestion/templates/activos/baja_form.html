{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto space-y-8">
    <div class="bg-white p-10 rounded-3xl shadow-sm border border-slate-100">
        <div class="flex items-center gap-4 mb-8 border-b pb-4">
            <span class="material-symbols-outlined text-red-700 text-4xl notranslate">assignment_return</span>
            <div>
                <h2 class="text-2xl font-black font-headline text-slate-900 uppercase">Baja de Asignación</h2>
                <p class="text-xs text-slate-500 font-bold uppercase tracking-widest">Vehículo: {{ asignacion.vehiculo.placa }} | Chofer: {{ asignacion.chofer.get_full_name }}</p>
            </div>
        </div>
        
        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            <div class="flex flex-col gap-2">
                <label class="text-[10px] font-black uppercase text-slate-400">Motivo del Retiro / Cambio</label>
                <textarea name="motivo" required placeholder="Describa el motivo de la baja (ej. Cambio de secretaría, mantenimiento mayor, etc.)" 
                          class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-primary h-32 resize-none"></textarea>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-[10px] font-black uppercase text-slate-400">Memorándum de Baja (Digitalizado)</label>
                <input type="file" name="documento_baja" required 
                       class="w-full p-4 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl text-xs font-bold text-slate-400 file:bg-primary file:text-white file:border-none file:px-4 file:py-2 file:rounded-lg file:mr-4 file:cursor-pointer">
            </div>

            <div class="pt-6 border-t border-slate-50 flex gap-4">
                <button type="submit" class="flex-1 bg-primary text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-red-900/20 hover:bg-red-900 transition-all active:scale-95">
                    Confirmar Baja y Liberar Activo
                </button>
                <a href="{% url 'historial_asignaciones' %}" class="px-8 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold uppercase text-xs flex items-center">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
