{% extends 'base.html' %}
{% block content %}
<div class="space-y-8">
    <div class="border-b pb-4">
        <h2 class="text-3xl font-black font-headline uppercase">Roles y Permisos</h2>
        <p class="text-slate-500">Definición de jerarquías y niveles de acceso al sistema.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        {% for r in roles_info %}
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between">
            <div>
                <div class="w-12 h-12 rounded-xl bg-red-50 flex items-center justify-center text-primary mb-4">
                    <span class="material-symbols-outlined notranslate">shield_person</span>
                </div>
                <h3 class="font-bold text-lg text-slate-900">{{ r.nombre }}</h3>
                <p class="text-xs text-slate-400 uppercase font-black tracking-widest mt-1">Código: {{ r.codigo }}</p>
            </div>
            <div class="mt-6 pt-4 border-t border-slate-50 flex justify-between items-center">
                <span class="text-sm font-medium text-slate-600">{{ r.cantidad }} Usuarios</span>
                <span class="text-[10px] bg-green-100 text-green-700 px-2 py-1 rounded-full font-bold uppercase">Activo</span>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
